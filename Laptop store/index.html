<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laptop </title>

  <!-- Bootstap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href= "style.css">
</head>
<body>

<nav class="navbar sticky-top bg-warning shadow-sm py-3">
  <div class="container">
    <div class="w-100 d-flex justify-content-center">
      <div class="search-box position-relative w-100 w-md-75">
        <input 
          type="text" 
          id="search"
          class="form-control rounded-pill px-4 py-2"
          placeholder = "Search for Laptop">
        <span class="search-icon">🔍</span>
      </div>
    </div>
  </div>
</nav>
<div class="container mt-4">
  <h2 class="text-center mb-4">Laptop Store</h2>
  
<div class="text-center mb-4">
  <button class="btn btn-dark filter-btn" data-category="All">All</button>
  <button class="btn btn-outline-dark filter-btn" data-category="Dell">Dell</button>
  <button class="btn btn-outline-dark filter-btn" data-category="HP">HP</button>
  <button class="btn btn-outline-dark filter-btn" data-category="Lenovo">Lenovo</button>
  <button class="btn btn-outline-dark filter-btn" data-category="Apple">Apple</button>
  <button class="btn btn-outline-dark filter-btn" data-category="Asus">Asus</button>
  <button class="btn btn-outline-dark filter-btn" data-category="Acer">Acer</button>
  <button class="btn btn-outline-dark filter-btn" data-category="Gaming">Gaming</button>
</div>
  <div class="row" id="productContainer"></div>
</div> <!-- ✅ ADD THIS -->
<script src="script.js"></script>
<footer class="text-center mt-5 p-3">
  <p>Laptop | Built with Html, Css, JavaScript</p>
</footer>
</body>
</html>
